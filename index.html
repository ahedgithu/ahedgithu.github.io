<!DOCTYPE html>
<html lang="en">
<head>
  <script defer src="/src/analytics.js?v=20260620-ga4"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ahmed Sayed | 401 Tracker</title>
  <meta name="description" content="A public 401 university tracker for topics, resources, and exam awareness." />
  <meta property="og:title" content="Ahmed Sayed | MED 401 Tracker" />
  <meta property="og:description" content="Track MED 401 university coverage, lecture resources, and work with Ahmed on AI agents or creative medical content." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/style.css?v=20260620-login" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/" aria-label="Ahmed Sayed tracker home">
      <span class="brand__mark">AS</span>
      <span>
        <strong>Ahmed Sayed</strong>
        <small>MED 401 hub</small>
      </span>
    </a>

    <nav class="site-nav" aria-label="Primary navigation">
      <a href="/">Tracker</a>
      <a href="/news.html">News</a>
      <a href="/history.html">History</a>
      <a href="/work.html">Work with me</a>
    </nav>

    <a class="site-login-link" href="/admin/login/">Login</a>
  </header>

  <main>
    <section class="tracker-home" id="tracker" aria-labelledby="tracker-title">
      <div class="section-heading">
        <h1 id="tracker-title">401</h1>
        <p class="tracker-updated">Last updated: Jun 18, 2026 · Sources: Study memory + latest Drive lecture folders</p>
      </div>

      <div class="semester-timeline" aria-label="Semester exam timeline">
        <div class="semester-timeline__top">
          <span>
            <strong>Next checkpoint</strong>
            <em id="next-checkpoint">Midterm</em>
          </span>
        </div>
        <div class="race-track">
          <div class="race-track__fill" id="semester-fill"></div>
          <span class="race-marker race-marker--today" id="today-marker">
            <b>Now</b>
          </span>
          <span class="race-marker race-marker--midterm" id="midterm-marker">
            <b>Flag</b>
            <time datetime="2026-07-18">Jul 18, 2026</time>
          </span>
          <span class="race-marker race-marker--finals" id="finals-marker">
            <b>Flag</b>
            <time datetime="2026-09-19">Sep 19, 2026</time>
          </span>
        </div>
        <div class="semester-date-scale" id="semester-date-scale" aria-label="Semester date scale"></div>
      </div>

      <div class="filter-panel" aria-label="Tracker topic filters">
        <label>
          <span>Search topics</span>
          <input id="tracker-search" type="search" placeholder="Search by topic or subject" autocomplete="off" />
        </label>
        <label>
          <span>Status</span>
          <select id="tracker-status-filter">
            <option value="all">All statuses</option>
            <option value="taken">Taken</option>
            <option value="partial">Partially taken</option>
            <option value="announced">Announced only</option>
            <option value="remaining">Remaining</option>
          </select>
        </label>
      </div>

      <div class="tracker-layout tracker-layout--home">
        <div class="subject-list" id="subject-list" aria-label="Subjects"></div>

        <article class="subject-detail" aria-live="polite">
          <div class="subject-detail__header">
            <div>
              <p class="card__kicker" id="selected-code">SUR-1</p>
              <h2 id="selected-name">Surgery 1</h2>
            </div>
            <span class="subject-detail__count" id="selected-count">0 / 0</span>
          </div>

          <div class="progress-wrap" aria-label="Subject coverage">
            <div class="progress-wrap__labels">
              <span>University-covered sessions</span>
              <strong id="selected-percent">0%</strong>
            </div>
            <div class="progress-bar">
              <div class="progress-bar__fill" id="progress-fill"></div>
            </div>
          </div>

          <div>
            <h3>Taken in university</h3>
            <ul class="topic-list" id="topic-list"></ul>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script defer src="/src/mcqs.js?v=20260623-184"></script>
  <script>
    window.SUPABASE_CONFIG = {
      url: '%VITE_SUPABASE_URL%',
      anonKey: '%VITE_SUPABASE_ANON_KEY%'
    }
  </script>
  <script type="importmap">
    {
      "imports": {
        "canvas-confetti": "https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.module.mjs"
      }
    }
  </script>
  <script type="module" src="/src/main.js?v=20260622-med2-onc"></script>
</body>
</html>
