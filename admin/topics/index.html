<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Topics | Ahmed Sayed</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/style.css?v=20260619-admin" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/" aria-label="Ahmed Sayed tracker home">
      <span class="brand__mark">AS</span>
      <span><strong>Ahmed Sayed</strong><small>Admin</small></span>
    </a>
    <nav class="site-nav" aria-label="Admin navigation">
      <a href="/">Tracker</a>
      <a href="/admin/dashboard/">Dashboard</a>
      <a href="/admin/topics/" aria-current="page">Topics</a>
    </nav>
  </header>

  <main>
    <section class="admin-shell" aria-labelledby="topics-title">
      <p class="form-message" data-admin-message hidden></p>
      <div data-admin-guard hidden>
        <div class="admin-topbar">
          <div>
            <p class="card__kicker">Private CMS</p>
            <h1 id="topics-title">Topics</h1>
            <p data-admin-profile></p>
          </div>
          <button class="secondary-action" type="button" data-admin-logout>Log out</button>
        </div>

        <div class="admin-topic-layout">
          <form class="admin-card admin-form" id="topic-form">
            <div>
              <p class="card__kicker">Editor</p>
              <h2 id="topic-form-title">Add topic</h2>
            </div>
            <label>
              <span>Subject</span>
              <select id="topic-subject" required>
                <option value="">Choose subject</option>
              </select>
            </label>
            <label>
              <span>Title</span>
              <input id="topic-title" type="text" required placeholder="Topic title" />
            </label>
            <label>
              <span>Status</span>
              <select id="topic-status" required>
                <option value="taken">Taken</option>
                <option value="partial">Partially taken</option>
                <option value="announced">Announced only</option>
                <option value="remaining" selected>Remaining</option>
              </select>
            </label>
            <label>
              <span>Section</span>
              <input id="topic-section" type="text" placeholder="Optional, e.g. Cardio" />
            </label>
            <label>
              <span>Lecture link</span>
              <input id="topic-lecture-url" type="url" placeholder="https://..." />
            </label>
            <label>
              <span>Audio link</span>
              <input id="topic-audio-url" type="url" placeholder="https://..." />
            </label>
            <label>
              <span>PDF link</span>
              <input id="topic-pdf-url" type="url" placeholder="https://..." />
            </label>
            <label>
              <span>PDF label</span>
              <input id="topic-pdf-label" type="text" placeholder="Download PDF" />
            </label>
            <label>
              <span>Extra lecture/map links JSON</span>
              <textarea id="topic-lecture-urls" rows="4">[]</textarea>
            </label>
            <label>
              <span>Extra PDF links JSON</span>
              <textarea id="topic-pdf-urls" rows="4">[]</textarea>
            </label>
            <label>
              <span>Date taken</span>
              <input id="topic-date-taken" type="date" />
            </label>
            <label>
              <span>Art index</span>
              <input id="topic-art" type="number" inputmode="numeric" value="0" min="0" max="15" />
            </label>
            <label>
              <span>Order</span>
              <input id="topic-order-index" type="number" inputmode="numeric" value="0" />
            </label>
            <label>
              <span>Public notes</span>
              <textarea id="topic-notes" rows="4" placeholder="Public notes only"></textarea>
            </label>
            <div class="contact-actions">
              <button class="primary-action" id="topic-submit" type="submit">Add topic</button>
              <button class="secondary-action" id="topic-reset" type="button">Clear</button>
            </div>
            <p class="form-message" data-topic-message hidden></p>
          </form>

          <section class="admin-card">
            <div class="section-title-row">
              <div>
                <p class="card__kicker">Database</p>
                <h2>Existing topics</h2>
              </div>
            </div>
            <div class="admin-topic-list" id="admin-topic-list" aria-live="polite"></div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <script>
    window.SUPABASE_CONFIG = {
      url: '%VITE_SUPABASE_URL%',
      anonKey: '%VITE_SUPABASE_ANON_KEY%'
    }
  </script>
  <script type="module" src="/src/admin.js?v=20260619-admin"></script>
</body>
</html>
